name: Final Gate (success)

# A no-op final-gate workflow used to exercise the MergeQueue final-gates
# feature. Always succeeds. Dispatched by Aviator via workflow_dispatch with
# `associated_prs` (JSON-encoded list of PR numbers) and `head_sha` (bot PR
# head commit) as inputs.

on:
  workflow_dispatch:
    inputs:
      associated_prs:
        description: "JSON-encoded list of PR numbers being merged"
        required: true
      head_sha:
        description: "Commit SHA of the bot PR being evaluated"
        required: true

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.head_sha }}
      - name: Report inputs
        run: |
          echo "Dispatched by Aviator for PRs: ${{ inputs.associated_prs }}"
          echo "Bot PR head SHA: ${{ inputs.head_sha }}"
      - name: Pass
        run: echo "Final gate succeeded"
